                ctx.moveTo(30, 90); ctx.quadraticCurveTo(64, 20, 98, 40);
                ctx.quadraticCurveTo(70, 55, 60, 95);
                ctx.stroke();
            },
            (ctx, w, h) => { // eye-like hieroglyph gesture
                ctx.beginPath();
                ctx.ellipse(64, 64, 38, 18, 0, 0, Math.PI * 2);
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(64, 64, 8, 0, Math.PI * 2);
                ctx.fill();
            },
            (ctx, w, h) => { // demotic cursive squiggle
                ctx.beginPath();
                ctx.moveTo(20, 60);
                ctx.bezierCurveTo(40, 20, 60, 100, 80, 40);
                ctx.bezierCurveTo(90, 15, 100, 70, 112, 50);
                ctx.stroke();
            },
            (ctx, w, h) => { // demotic short strokes
                ctx.beginPath();
                ctx.moveTo(24, 40); ctx.lineTo(70, 30);
                ctx.moveTo(30, 70); ctx.lineTo(90, 60);
                ctx.moveTo(20, 100); ctx.lineTo(60, 92);
                ctx.stroke();
            },
            (ctx, w, h) => { // scattered Greek letter (never a word)
                ctx.font = '76px serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                const letters = ['Α', 'Θ', 'Ξ', 'Σ', 'Φ', 'Ω', 'Λ', 'Δ'];
                ctx.fillText(letters[Math.floor(Math.random() * letters.length)], 64, 68);
            },
        ];

        function createInscriptionFragments() {
            const group = new THREE.Group();
            const count = 14;
            for (let i = 0; i < count; i++) {
                const drawer = GLYPH_DRAWERS[i % GLYPH_DRAWERS.length];
                const texture = makeGlyphCanvas(drawer);
                const material = new THREE.SpriteMaterial({
                    map: texture,
                    transparent: true,
                    opacity: 0,
                    depthWrite: false,
                    blending: THREE.AdditiveBlending,
                    color: 0xEDE3CF,
                });
                const sprite = new THREE.Sprite(material);
                const scale = 0.5 + Math.random() * 0.6;
                sprite.scale.set(scale, scale, 1);
                sprite.position.set(
                    (Math.random() - 0.5) * 9,
                    0.2 + Math.random() * 3.2,
                    (Math.random() - 0.5) * 3
                );
                // A slow upward, slightly sideways drift — "like
                // forgotten memories" — applied per-frame via userData
                // rather than a dedicated animation loop hook, read by
                // driftInscriptionFragments() while the group is alive.
                sprite.userData.driftY = 0.06 + Math.random() * 0.08;
                sprite.userData.driftX = (Math.random() - 0.5) * 0.05;
                group.add(sprite);
            }
            return group;
        }

        // Advances the slow drift of an inscription-fragment group by
        // one frame's worth of motion. Called from a short-lived
        // requestAnimationFrame loop owned by the transition itself
        // (not the main animate() loop) so it cleanly starts and stops
        // with the group's own lifetime.
        function driftInscriptionFragments(group, deltaSeconds) {
            group.children.forEach((sprite) => {
                sprite.position.y += sprite.userData.driftY * deltaSeconds;
                sprite.position.x += sprite.userData.driftX * deltaSeconds;
            });
        }

        function tweenGroupOpacity(group, targetOpacity, duration) {
            const sprites = group.children;
            if (!sprites.length) return Promise.resolve();
            const startOpacities = sprites.map((s) => s.material.opacity);
            return tweenValue(duration, (t) => {
                sprites.forEach((sprite, i) => {
                    sprite.material.opacity = startOpacities[i] + (targetOpacity - startOpacities[i]) * t;
                });
            });
        }

        // Runs a short-lived rAF loop driving both the drift and an
        // opacity tween together, since the fragments need to be moving
        // the entire time they're visible, not just during the fade
        // in/out edges.
        function playInscriptionFragments(group, { holdMs = 1600, fadeInMs = 900, fadeOutMs = 1100 } = {}) {
            return new Promise((resolve) => {
                let last = performance.now();
                const start = last;
                const totalMs = fadeInMs + holdMs + fadeOutMs;

                function step(now) {
                    const deltaSeconds = (now - last) / 1000;
                    last = now;
                    const elapsedMs = now - start;

                    driftInscriptionFragments(group, deltaSeconds);

                    let opacity;
                    if (elapsedMs < fadeInMs) {
                        opacity = (elapsedMs / fadeInMs) * 0.16;
                    } else if (elapsedMs < fadeInMs + holdMs) {
                        opacity = 0.16;
                    } else {
                        const t = (elapsedMs - fadeInMs - holdMs) / fadeOutMs;
                        opacity = 0.16 * (1 - Math.min(t, 1));
                    }
                    group.children.forEach((sprite) => {
                        sprite.material.opacity = opacity;
                    });

                    if (elapsedMs < totalMs) {
                        requestAnimationFrame(step);
                    } else {
                        resolve();
                    }
                }
                requestAnimationFrame(step);
            });
        }

        async function advanceToNextArtifact() {
            if (isTransitioning) return;
            isTransitioning = true;
            clearTimeout(autoAdvanceTimer);
            clearTimeout(glintTimer);
            goldenGlintLight.intensity = 0;

            const nextIndex = (currentArtifactIndex + 1) % ARTIFACTS.length;
            const nextData = ARTIFACTS[nextIndex];
            const enteringSpace = !!nextData.direction?.spaceMode;
            // Leaving a space-mode exhibit (currently only Voyager → the
            // Rosetta Stone) gets its own quiet transition — see Phase C
            // below — instead of the usual swoosh.
            const leavingSpace = !!ARTIFACTS[currentArtifactIndex].direction?.spaceMode;

            // Phase A — a contemplative beat before the world reacts
            await wait(800);

            // Phase B — the current witness recedes into darkness, using
            // its OWN exit style (set the last time applyDirection ran,
            // for the exhibit currently on stage). Entering OR leaving a
            // space-mode exhibit uses a slower, more total fade instead
            // of the usual quick exit — "everything slowly fades" rather
            // than a swoosh; "the distant sunlight fades, the stars
            // disappear one by one."
            const fadeOutDuration = (enteringSpace || leavingSpace) ? SPACE_ENTRY_FADE_MS : exitDuration;
            hideIdentityPanel();
            await Promise.all([
                tweenArtifactOpacity(artifactMaterials, 0, fadeOutDuration),
                tweenLightIntensity(mainSpot, 0, fadeOutDuration),
                tweenLightIntensity(rimLight, 0, fadeOutDuration),
                tweenLightIntensity(fillLight, 0, fadeOutDuration),
                tweenLightIntensity(ambient, 0, fadeOutDuration),
                tweenMaterialOpacity(beamMaterial, 0, fadeOutDuration),
                tweenMaterialOpacity(lightPool.material, 0, fadeOutDuration),
                tweenMaterialOpacity(starMaterial, 0, fadeOutDuration),
            ]);

            disposeArtifactModel();

            // The stage is now fully dark — safe to retune the spotlight
            // shape, idle behavior, camera framing, and pacing for the
            // incoming exhibit without any visible pop.
            applyDirection(nextData.direction);

            // Begin loading the next artifact while the transition plays
            // out, using the exact same loading pipeline as every other
            // exhibit — no duplicated loading logic.
            const loadPromise = loadArtifact(nextData, { autoEntrance: false });

            if (enteringSpace) {
                // No swoosh, no silhouettes — the museum doesn't just
                // change exhibits here, it ends. The camera eases to its
                // far-back space framing while the screen is completely
                // black (so the move is never actually seen), then the
                // darkness itself is held for a beat — no movement, no
                // sound — before anything returns.
                await tweenCameraDistance(
                    (nextData.direction.cameraDistance.min + nextData.direction.cameraDistance.max) / 2,
                    400
                );
                await wait(BLACKOUT_HOLD_MS);
            } else if (leavingSpace) {
                // Phase C — leaving space: no swoosh, no silhouettes.
                // The camera eases to the next exhibit's framing while
                // the screen holds complete darkness, that darkness is
                // held for a beat, and then — instead of a violent
                // swoosh — faint fragments of hieroglyphs, demotic
                // script, and ancient Greek letters drift up out of the
                // dark like forgotten memories, never composed into
                // anything readable, before dissolving again.
                await tweenCameraDistance(
                    (nextData.direction.cameraDistance.min + nextData.direction.cameraDistance.max) / 2,
                    400
                );
                await wait(BLACKOUT_HOLD_MS);

                const fragments = createInscriptionFragments();
                scene.add(fragments);
                await playInscriptionFragments(fragments);
                disposeGroup(fragments);
                scene.remove(fragments);
            } else {
                // Phase C — the swoosh: history thrown sideways
                const silhouettes = createSilhouettes();
                stageGroup.add(silhouettes);

                await Promise.all([
                    tweenStagePosition(-SWOOSH_DISTANCE, 450),
                    tweenCameraDistance(
                        (nextData.direction.cameraDistance.min + nextData.direction.cameraDistance.max) / 2,
                        450
                    ),
                ]);

                // Cut — instantaneous, hidden by near-total darkness
                stageGroup.position.x = 0;
                disposeGroup(silhouettes);
                stageGroup.remove(silhouettes);
            }

            await loadPromise.catch(() => {
                // Error already logged inside loadArtifact; continue the
                // sequence so the museum doesn't stall on a bad exhibit.
            });

            currentArtifactIndex = nextIndex;
            updateIdentityPanel(nextData);
            setTestimonyText(nextData.quote);

            // A brief held beat in total darkness after the cut settles —
            // "the movement settles, silence, darkness" — before anything
            // ignites. Short enough not to read as a stall, long enough
            // to feel like arrival rather than a jump cut.
            await wait(300);

            // Phase D — the witness settles in, using this exhibit's own
            // entrance duration for the object fade (handled in the
            // animation loop via `entranceDuration`). A space-mode
            // exhibit ignites far more slowly than a spotlight ever does —
            // "nothing rushes."
            entranceComplete = false;
            entranceStartTime = performance.now();
            beginIdleRotation(nextData.direction);
            if (nextData.direction.idle === 'present') {
                schedulePresentRotation(nextData.direction);
            }
            scheduleGoldenGlint(nextData.direction);

            const igniteDuration = enteringSpace ? SPACE_ARRIVAL_LIGHT_MS : 700;
            if (nextData.direction.staggeredIgnite) {
                // "The light begins at the base and gently climbs
                // upward" — approximated as a phased ignite rather than
                // a literal vertical sweep: the floor glow and ambient
                // resolve first (grounding), then the spotlight itself
                // rises in more slowly than the usual quick ignite.
                await Promise.all([
                    tweenMaterialOpacity(lightPool.material, currentPoolOpacity, 500),
                    tweenLightIntensity(ambient, currentAmbientIntensity, 500),
                    tweenLightIntensity(fillLight, FILL_LIGHT_INTENSITY, 500),
                ]);
                await Promise.all([
                    tweenLightIntensity(mainSpot, MAIN_SPOT_INTENSITY, 1600),
                    tweenLightIntensity(rimLight, RIM_LIGHT_INTENSITY, 1600),
                    tweenMaterialOpacity(beamMaterial, currentBeamOpacity, 1600),
                    tweenMaterialOpacity(starMaterial, currentStarOpacity, 1600),
                ]);
            } else {
                await Promise.all([
                    tweenLightIntensity(mainSpot, MAIN_SPOT_INTENSITY, igniteDuration),
                    tweenLightIntensity(rimLight, RIM_LIGHT_INTENSITY, igniteDuration),
                    tweenLightIntensity(fillLight, FILL_LIGHT_INTENSITY, igniteDuration),
                    tweenLightIntensity(ambient, currentAmbientIntensity, igniteDuration),
                    tweenMaterialOpacity(beamMaterial, currentBeamOpacity, igniteDuration),
                    tweenMaterialOpacity(lightPool.material, currentPoolOpacity, igniteDuration),
                    tweenMaterialOpacity(starMaterial, currentStarOpacity, igniteDuration),
                ]);
            }

            revealIdentityPanel();
            setTimeout(startTestimony, 600);

            isTransitioning = false;
            entranceStartTime = performance.now();
            if (!isPaused) scheduleAutoAdvance();
        }
        // ─────────────────────────────────────────
        // GO TO ARTIFACT (for prev / restart)
        // ─────────────────────────────────────────
        async function goToArtifact(targetIndex) {
            if (isTransitioning) return;
            isTransitioning = true;
            clearTimeout(autoAdvanceTimer);
            clearTimeout(glintTimer);
            goldenGlintLight.intensity = 0;

            const nextData = ARTIFACTS[targetIndex];
            const enteringSpace = !!nextData.direction?.spaceMode;
            const leavingSpace = !!ARTIFACTS[currentArtifactIndex].direction?.spaceMode;

            await wait(800);

            const fadeOutDuration = (enteringSpace || leavingSpace) ? SPACE_ENTRY_FADE_MS : exitDuration;
            hideIdentityPanel();
            await Promise.all([
                tweenArtifactOpacity(artifactMaterials, 0, fadeOutDuration),
                tweenLightIntensity(mainSpot, 0, fadeOutDuration),
                tweenLightIntensity(rimLight, 0, fadeOutDuration),
                tweenLightIntensity(fillLight, 0, fadeOutDuration),
                tweenLightIntensity(ambient, 0, fadeOutDuration),
                tweenMaterialOpacity(beamMaterial, 0, fadeOutDuration),
                tweenMaterialOpacity(lightPool.material, 0, fadeOutDuration),
                tweenMaterialOpacity(starMaterial, 0, fadeOutDuration),
            ]);

            disposeArtifactModel();
            applyDirection(nextData.direction);

            const loadPromise = loadArtifact(nextData, { autoEntrance: false });

            if (enteringSpace) {
                await tweenCameraDistance(
                    (nextData.direction.cameraDistance.min + nextData.direction.cameraDistance.max) / 2,
                    400
                );
                await wait(BLACKOUT_HOLD_MS);
            } else if (leavingSpace) {
                await tweenCameraDistance(
                    (nextData.direction.cameraDistance.min + nextData.direction.cameraDistance.max) / 2,
                    400
                );
                await wait(BLACKOUT_HOLD_MS);

                const fragments = createInscriptionFragments();
                scene.add(fragments);
                await playInscriptionFragments(fragments);
                disposeGroup(fragments);
                scene.remove(fragments);
            } else {
                const silhouettes = createSilhouettes();
                stageGroup.add(silhouettes);

                await Promise.all([
                    tweenStagePosition(-SWOOSH_DISTANCE, 450),
                    tweenCameraDistance(
                        (nextData.direction.cameraDistance.min + nextData.direction.cameraDistance.max) / 2,
                        450
                    ),
                ]);

                stageGroup.position.x = 0;
                disposeGroup(silhouettes);
                stageGroup.remove(silhouettes);
            }

            await loadPromise.catch(() => {});

            currentArtifactIndex = targetIndex;
            updateIdentityPanel(nextData);
            setTestimonyText(nextData.quote);

            await wait(300);

            entranceComplete = false;
            entranceStartTime = performance.now();
            beginIdleRotation(nextData.direction);
            if (nextData.direction.idle === 'present') {
                schedulePresentRotation(nextData.direction);
            }
            scheduleGoldenGlint(nextData.direction);

            const igniteDuration = enteringSpace ? SPACE_ARRIVAL_LIGHT_MS : 700;
            if (nextData.direction.staggeredIgnite) {
                await Promise.all([
                    tweenMaterialOpacity(lightPool.material, currentPoolOpacity, 500),
                    tweenLightIntensity(ambient, currentAmbientIntensity, 500),
                    tweenLightIntensity(fillLight, FILL_LIGHT_INTENSITY, 500),
                ]);
                await Promise.all([
                    tweenLightIntensity(mainSpot, MAIN_SPOT_INTENSITY, 1600),
                    tweenLightIntensity(rimLight, RIM_LIGHT_INTENSITY, 1600),
                    tweenMaterialOpacity(beamMaterial, currentBeamOpacity, 1600),
                    tweenMaterialOpacity(starMaterial, currentStarOpacity, 1600),
                ]);
            } else {
                await Promise.all([
                    tweenLightIntensity(mainSpot, MAIN_SPOT_INTENSITY, igniteDuration),
                    tweenLightIntensity(rimLight, RIM_LIGHT_INTENSITY, igniteDuration),
                    tweenLightIntensity(fillLight, FILL_LIGHT_INTENSITY, igniteDuration),
                    tweenLightIntensity(ambient, currentAmbientIntensity, igniteDuration),
                    tweenMaterialOpacity(beamMaterial, currentBeamOpacity, igniteDuration),
                    tweenMaterialOpacity(lightPool.material, currentPoolOpacity, igniteDuration),
                    tweenMaterialOpacity(starMaterial, currentStarOpacity, igniteDuration),
                ]);
            }

            revealIdentityPanel();
            setTimeout(startTestimony, 600);

            isTransitioning = false;
            if (!isPaused) scheduleAutoAdvance();
        }

        document.getElementById('btn-next').addEventListener('click', () => {
            resetBarHideTimer();
            advanceToNextArtifact();
        });

        document.getElementById('btn-prev').addEventListener('click', () => {
            resetBarHideTimer();
            goToArtifact((currentArtifactIndex - 1 + ARTIFACTS.length) % ARTIFACTS.length);
        });

        document.getElementById('btn-restart').addEventListener('click', () => {
            resetBarHideTimer();
            goToArtifact(currentArtifactIndex);
        });

        // Keyboard shortcuts for playback controls
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') {
                advanceToNextArtifact();
            } else if (e.key === 'ArrowLeft') {
                goToArtifact((currentArtifactIndex - 1 + ARTIFACTS.length) % ARTIFACTS.length);
            } else if (e.key === ' ') {
                e.preventDefault();
                document.getElementById('btn-play-pause').click();
            } else if (e.key === 'r' || e.key === 'R') {
                goToArtifact(currentArtifactIndex);
            }
        });

        requestAnimationFrame(updateProgress);




        // OrbitControls: pause the gentle auto-rotate while the visitor
        // is interacting, and resume it after a few seconds of stillness.
        let idleResumeTimer = null;
        controls.addEventListener('start', () => {
            controls.autoRotate = false;
            clearTimeout(idleResumeTimer);
        });
        controls.addEventListener('end', () => {
            clearTimeout(idleResumeTimer);
            idleResumeTimer = setTimeout(() => {
                controls.autoRotate = true;
            }, IDLE_ROTATE_RESUME_MS);
        });

        // ─────────────────────────────────────────
        // ANIMATION LOOP
        // ─────────────────────────────────────────
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const now = performance.now();
            const elapsed = clock.getElapsedTime();

            // Idle behavior is per-exhibit (see applyDirection):
            //   'orbit'   — the camera slowly circles a still object,
            //               exactly as before (controls.autoRotate).
            //   'breathe' — the camera holds its position, and the
            //               artifact itself sways ~10° left, pauses,
            //               ~10° right, pauses — slow and deliberate,
            //               like a painting being studied rather than
            //               a specimen being spun.
            controls.update();
            if (idleMode === 'breathe') {
                const cycle = (elapsed * 1000) % BREATHE_PERIOD_MS / BREATHE_PERIOD_MS;
                // Smooth back-and-forth rather than a raw sine's constant
                // motion — eases in and out of each extreme so it reads
                // as a held pause rather than a mechanical oscillation.
                const sway = Math.sin(cycle * Math.PI * 2);
                const eased = Math.sign(sway) * Math.pow(Math.abs(sway), 0.6);
                artifactRoot.rotation.y = eased * BREATHE_AMPLITUDE;
            } else if (idleMode === 'drift') {
                // Not a museum object performing for an audience — a
                // spacecraft that has been travelling for decades without
                // anyone watching. An extremely slow, continuous tumble
                // plus a barely-there positional wander; nothing here
                // should ever read as intentional motion.
                artifactRoot.rotation.y = elapsed * DRIFT_ROTATION_SPEED;
                artifactRoot.rotation.x = Math.sin(elapsed * 0.05) * DRIFT_TILT_AMPLITUDE;
                artifactRoot.position.x = Math.sin(elapsed * 0.033) * DRIFT_POSITION_AMPLITUDE;
                artifactRoot.position.y = ARTIFACT_ROOT_BASE_Y +
                    Math.sin(elapsed * 0.021) * DRIFT_POSITION_AMPLITUDE * 0.5;
            }

            // Camera breathing: an almost imperceptible vertical drift,
            // ~0.3% of the camera's distance from the artifact. Not
            // meant to be consciously noticed — just enough that the
            // room doesn't feel frozen.
            const breatheAmplitude = camera.position.distanceTo(controls.target) * 0.003;
            camera.position.y += Math.sin(elapsed * 0.15) * breatheAmplitude;

            // Very subtle entrance fade-in for the artifact, once loaded
            if (!entranceComplete && artifactMaterials.length > 0) {
                const entranceProgress = Math.min((now - entranceStartTime) / entranceDuration, 1);
                artifactMaterials.forEach((mat) => {
                    mat.opacity = entranceProgress;
                });
                if (entranceProgress >= 1) {
                    artifactMaterials.forEach((mat) => {
                        mat.transparent = false;
                    });
                    entranceComplete = true;
                }
            }

            // Update testimony word reveals
            updateTestimony(now);

            renderer.render(scene, camera);
        }

        // ─────────────────────────────────────────
        // RESIZE HANDLER
        // ─────────────────────────────────────────
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ─────────────────────────────────────────
        // INIT
        // ─────────────────────────────────────────
        // Wait a brief moment for everything to settle, then begin
        setTimeout(startEntrance, 300);
        animate();

    </script>
