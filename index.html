<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VESTIGE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;1,6..72,300;1,6..72,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/index.css">
</head>
<body>
    <div class="atmosphere" id="atmosphere"></div>
    <div class="vignette"></div>
    <div class="beam" id="beam"></div>
    <div class="depth-layer" id="depthLayer"></div>

    <div class="swoosh-container" id="swooshContainer">
        <div class="swoosh-streak"></div>
        <div class="swoosh-streak"></div>
        <div class="swoosh-streak"></div>
        <div class="swoosh-streak"></div>
        <div class="swoosh-streak"></div>
    </div>

    <!-- STAGE 1: SPLASH -->
    <div class="stage active" id="stageSplash">
        <h1 class="splash-title" id="splashTitle">VESTIGE</h1>
        <p class="splash-tagline" id="splashTagline">Every object remembers.</p>
    </div>

    <!-- STAGE 2: PHILOSOPHY -->
    <div class="stage" id="stagePhilosophy">
        <span class="philosophy-word" id="philosophyWord"></span>
    </div>

    <!-- STAGE 3: CURATOR -->
    <div class="stage" id="stageCurator">
        <p class="curator-line" id="curatorLine"></p>
    </div>

    <!-- STAGE 4: THRESHOLD -->
    <div class="stage" id="stageThreshold">
        <h1 class="threshold-logo" id="thresholdLogo">VESTIGE</h1>
        <p class="threshold-subtitle" id="thresholdSubtitle">An Interactive Museum of Witnesses</p>
    </div>

    <!-- PROMPT -->
    <div class="threshold-prompt" id="thresholdPrompt">
        <span class="prompt-text" id="promptText">Scroll Forward</span>
        <div class="prompt-line"></div>
    </div>

    <script src="assets/js/index.js"></script>
</body>
</html>
